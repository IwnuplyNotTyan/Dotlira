networks:
  default:
    name: selfhosted

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=6969
      - TORRENTING_PORT=6881
      - DOCKER_MODS=ghcr.io/gabe565/linuxserver-mod-vuetorrent
    volumes:
      - /mnt/second/docker/qbittorrent/appdata:/config
      - /home/q/downloads:/downloads
      - /mnt/first/home/q/files/media:/media
      - ~/files/media:/nvme/media
      - /mnt/second:/disk
    ports:
      - 6969:6969
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    labels:
      - "docktail.service.enable=true"
      - "docktail.service.name=qui"
      - "docktail.service.port=7476"
      - "docktail.service.service-port=443"
    volumes:
     - /mnt/second/docker/qui-config:/config
    ports:
      - 7476:7476
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kyiv
      - AUTO_UPDATE=true
    volumes:
      - /mnt/second/docker/jackett/config:/config
      - /mnt/second/docker/jackett/downloads:/downloads
    ports:
      - 9117:9117
    restart: unless-stopped
